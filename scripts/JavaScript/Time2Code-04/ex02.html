<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

<body>
    
    <!-- 2 - Planetas
    Crie uma array de planetas que inclua "Terra", "Marte", "Plutão", "Vênus", "Júpiter", "Saturno"  e, em seguida, peça ao usuário para digitar o nome de um planeta.
    Verifique se o planeta que o usuário informou está na array e informe ao usuário. -->

    <h2>Planetas</h2>

    <script>
        const planets = ["Terra", "Marte", "Plutão", "Vênus", "Júpiter", "Saturno"];

        let userInput = prompt("Digite um planeta: ");

        if (userInput){
            let found = false;

            for (let i = 0; i < planets.length; i++) {
                if (userInput.toLowerCase() === planets[i].toLowerCase()) {
                    found = true;
                    break;
                }
            }

            if (found) {
                alert("O planeta " + userInput + " existe na lista!");
            } else {
                alert("O planeta " + userInput + " não existe na lista!");
            }
        }

    </script>

</body>
</html>
