<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora de codar 2: Ex03</title>
</head>
<body>
    <!-- 3. Faça um programa para ler 3 valores (considere que não serão informados valores iguais) e escrever o maior deles.  -->

    <h2>Maior valor entre 3</h2>
    <label for="">Primeiro Nº: </label>
    <input type="number" id="firstNumber"> <br>

    <label for="">Segundo Nº: </label>
    <input type="number" id="secNumber"> <br>

    <label for="">Terceiro Nº: </label>
    <input type="number" id="thirdNumber"> <br>

    <button onclick="checkGreater()">Checar</button>

    <script>
        function checkGreater() {
            let n1 = Number(document.getElementById("firstNumber").value);
            let n2 = Number(document.getElementById("secNumber").value);
            let n3 = Number(document.getElementById("thirdNumber").value);

            let maxVal = Math.max(n1, n2, n3);

            alert("O maior número é: " + maxVal)
        }
    </script>


</body>
</html>
