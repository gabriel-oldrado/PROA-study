<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora de codar 2: Ex03</title>
</head>
<body>
    <!-- 4. Faça um programa que leia 3 valores informados pelo usuário (considere que não serão informados valores iguais) e escrever a soma dos 2 maiores.  -->

    <h2>Soma dos 2 maiores</h2>
    <input type="number" id="firstNumber" placeholder="Primeiro número"><br><br>
    <input type="number" id="secNumber" placeholder="Segundo número"><br><br>
    <input type="number" id="thirdNumber" placeholder="Terceiro número"><br><br>

    <button onclick="checkGreater()">Checar</button>

    <script>
        function checkGreater() {
            let n1 = Number(document.getElementById("firstNumber").value);
            let n2 = Number(document.getElementById("secNumber").value);
            let n3 = Number(document.getElementById("thirdNumber").value);
            
            const sortedNum = [n1, n2, n3];
            sortedNum.sort(function(a, b) {return b - a});
            // console.log(sortedNum);

            let sum = sortedNum[0] + sortedNum[1];


            alert("A soma fica: " + sortedNum[0] + " + " + sortedNum[1] + " = " + sum);
        }
    </script>
    
</body>
</html>
