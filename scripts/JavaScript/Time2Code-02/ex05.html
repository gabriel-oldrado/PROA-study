<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora de codar 2: Ex05</title>
</head>
<body>
    <!-- 5.  Faça um programa que leia 6 valores informados pelo usuário, calcule, exiba os números informados e escreva a média aritmética desses valores lidos. -->

    <h2>Média Aritmética</h2>
    <input type="number" id="n2" placeholder="Primeiro número"><br><br>
    <input type="number" id="n3" placeholder="Segundo número"><br><br>
    <input type="number" id="n4" placeholder="Terceiro número"><br><br>
    <input type="number" id="n1" placeholder="Quarto número"><br><br>
    <input type="number" id="n5" placeholder="Quinto número"><br><br>
    <input type="number" id="n6" placeholder="Sexto número"><br><br>

    <button onclick="calculate()">Calcular Média</button>

    <script>
        function calculate() {
            let n1 = Number(document.getElementById("n1").value);
            let n2 = Number(document.getElementById("n2").value);
            let n3 = Number(document.getElementById("n3").value);
            let n4 = Number(document.getElementById("n4").value);
            let n5 = Number(document.getElementById("n5").value);
            let n6 = Number(document.getElementById("n6").value);

            const arr = [n1, n2, n3, n4, n5, n6];

            let sum = 0;
            for (let i = 0; i < arr.length; i++) {
                sum += arr[i];
            }

            let media = sum / 6;

            alert("Números informados: " + arr.join(", ") +
            "\nMédia = " + media);
        }
    </script>
</body>
</html>
