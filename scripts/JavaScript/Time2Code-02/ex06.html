<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora de codar 2: Ex06</title>
</head>
<body>
    <!-- 6. Faça um programa que receba quatro valores informados pelo usuário, mas informe somente o primeiro, o último e o maior de todos eles (considere que todos os números informados serão diferentes) -->

    <h2>Digite 4 números</h2>

    <input type="number" id="n1" placeholder="Primeiro número"><br><br>
    <input type="number" id="n2" placeholder="Segundo número"><br><br>
    <input type="number" id="n3" placeholder="Terceiro número"><br><br>
    <input type="number" id="n4" placeholder="Quarto número"><br><br>

    <button onclick="checkNumbers()">Verificar</button>

    <script>
        function checkNumbers() {
            let n1 = Number(document.getElementById("n1").value);
            let n2 = Number(document.getElementById("n2").value);
            let n3 = Number(document.getElementById("n3").value);
            let n4 = Number(document.getElementById("n4").value);

            let max = Math.max(n1, n2, n3, n4);

            alert("Primeiro número: " + n1 +
                "\nÚltimo número: " + n4 +
                "\nMaior número: " + max
            );
        }
        
    </script>
</body>
</html>
